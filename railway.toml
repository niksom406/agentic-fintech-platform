# Railway config at repo root — forces Docker (not Railpack) for this monorepo.
# Prefer setting Root Directory to `backend` in the dashboard when possible.
# This root config exists so README-only / monorepo layouts do not fall back to Railpack.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/backend/**", "/Dockerfile", "/railway.toml"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
