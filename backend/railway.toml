# Railway config for the backend service.
# In the Railway dashboard, also set Root Directory to: backend
# (required so the Docker build context is the backend/ folder)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
