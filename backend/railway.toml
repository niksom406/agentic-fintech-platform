# Railway config for the backend service.
#
# REQUIRED in Railway dashboard → Settings:
#   Root Directory: backend
#   Config file path (if asked): /backend/railway.toml
#
# watchPatterns are from the repo root — README-only commits should NOT redeploy.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["/backend/**"]

[deploy]
# Healthcheck disabled — re-enable once /health is stable on the public URL:
# healthcheckPath = "/health"
# healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
