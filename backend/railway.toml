# Railway config for the backend service.
# Dashboard: set Root Directory to `backend`

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Healthcheck disabled for now — Railway was failing before the public
# domain/port mapping settled. Re-enable once /health works in the browser:
# healthcheckPath = "/health"
# healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
